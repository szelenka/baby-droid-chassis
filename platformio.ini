[platformio]
src_dir = src
default_envs = release

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.32
framework = arduino
monitor_speed = 115200
board = seeed_xiao_esp32c6
extra_scripts = pre:scripts/patch_esp32servo.py

; Libraries (shared across all environments)
lib_deps =
    ; ESP-NOW is built into the ESP32 Arduino framework
    ; ESP32Servo for continuous rotation servo control
    madhephaestus/ESP32Servo@^3.2.0
    dfrobot/DFRobotDFPlayerMini@^1.0.6

; ============================================
; RELEASE ENVIRONMENT (default)
; ============================================
[env:release]
build_type = release
build_flags =
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<calibrate_servo.cpp>

; ============================================
; CALIBRATION ENVIRONMENT
; ============================================
[env:calibrate]
build_type = debug
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DCALIBRATION_MODE
build_src_filter = 
    +<calibrate_servo.cpp>
    -<main.cpp>
