<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1080" viewBox="0 0 1700 1080" role="img" aria-labelledby="title desc">
  <title id="title">Baby Droid Chassis Wiring Diagram</title>
  <desc id="desc">Single connected wiring diagram showing a 2S LiPo battery, an SPST switch, a Hobbywing 3A UBEC set to 6 volts for three FEETECH FS90R servos, a bulk capacitor across the 6 volt servo rail, an LM2596 buck converter set to 5 volts for logic power, a Schottky diode on the XIAO 5V branch, a resistor divider and optional filter capacitor for battery sensing into XIAO D0 GPIO0, a XIAO ESP32C6, a DFPlayer Mini MP3 module, and an 8 ohm mono speaker. The diagram shows the switched battery rail, common ground rail, regulated 6 volt servo rail, regulated 5 volt logic feed, UART wiring, battery sense wiring, and speaker outputs.</desc>

