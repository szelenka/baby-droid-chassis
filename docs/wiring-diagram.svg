      .dropbat { stroke: #92400e; stroke-width: 4; fill: none; }
      .drop6 { stroke: #c2410c; stroke-width: 4; fill: none; }
      .dropg { stroke: #111827; stroke-width: 4; fill: none; }
      .passive { fill: #ffffff; stroke: #6b7280; stroke-width: 2; }
      .passive5 { fill: #ffffff; stroke: #2563eb; stroke-width: 2.5; }
      .dotbat { fill: #92400e; }
      .dot6 { fill: #c2410c; }
      .dotg { fill: #111827; }
      .dot5 { fill: #2563eb; }
      .dots { fill: #6b7280; }
      .dots0 { fill: #059669; }
      .dots1 { fill: #7c3aed; }
      .dots2 { fill: #dc2626; }
      .dottx { fill: #0f766e; }
      .dotrx { fill: #a16207; }
